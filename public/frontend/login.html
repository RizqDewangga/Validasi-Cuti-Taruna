<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Modern - Sistem Cuti Taruna</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom styles (opsional) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 min-h-screen flex items-center justify-center p-4">
    <!-- Background animated shapes -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-white rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-float"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-float" style="animation-delay: 2s;"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-float" style="animation-delay: 4s;"></div>
    </div>

    <!-- Login Card -->
    <div class="relative w-full max-w-md">
        <div class="glass-effect rounded-2xl shadow-2xl p-8 space-y-6">
            <!-- Header -->
            <div class="text-center">
                <h2 class="text-3xl font-bold text-white">Selamat Datang</h2>
                <p class="text-indigo-100 mt-2">Silakan masuk ke akun Anda</p>
            </div>

            <!-- Alert -->
            <div id="alertMessage" class="hidden bg-red-500/20 border border-red-500 text-red-100 px-4 py-3 rounded-lg text-sm" role="alert"></div>

            <!-- Form -->
            <form id="loginForm" class="space-y-5">
                <!-- Role Selection -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Pilih Role</label>
                    <select id="role" required class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
                        <option value="" class="bg-gray-800 text-white">-- Pilih Role --</option>
                        <option value="taruna" class="bg-gray-800 text-white">Taruna</option>
                        <option value="orang_tua" class="bg-gray-800 text-white">Orang Tua</option>
                        <option value="admin" class="bg-gray-800 text-white">Admin</option>
                    </select>
                </div>

                <!-- Taruna Fields -->
                <div id="tarunaFields" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-white mb-2">NPM</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-id-card"></i></span>
                            <input type="text" id="npm" placeholder="Masukkan NPM" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-white mb-2">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-lock"></i></span>
                            <input type="password" id="password" placeholder="Masukkan password" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
                        </div>
                    </div>
                </div>

                <!-- Orang Tua Fields -->
                <div id="orangTuaFields" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-white mb-2">Nama Ibu</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-female"></i></span>
                            <input type="text" id="nama_ibu" placeholder="Masukkan nama ibu" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-white mb-2">Nama Anak</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-child"></i></span>
                            <input type="text" id="nama_anak" placeholder="Masukkan nama anak" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-white mb-2">Tanggal Lahir Anak</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-calendar"></i></span>
                            <input type="date" id="tanggal_lahir_anak" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition [color-scheme:dark]">
                        </div>
                    </div>
                </div>

                <!-- Admin Fields -->
                <div id="adminFields" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-white mb-2">Password Admin</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-lock"></i></span>
                            <input type="password" id="password_admin" placeholder="Masukkan password admin" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition">
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full py-3 px-4 bg-white text-indigo-600 font-semibold rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition duration-300 ease-in-out">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
            </form>

            <!-- Footer -->
            <div class="text-center text-sm text-indigo-100">
                Belum punya akun taruna?
                <a href="register-modern.html" class="font-semibold text-white hover:underline">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Toggle fields based on role
        const roleSelect = document.getElementById('role');
        const tarunaFields = document.getElementById('tarunaFields');
        const orangTuaFields = document.getElementById('orangTuaFields');
        const adminFields = document.getElementById('adminFields');

        roleSelect.addEventListener('change', function() {
            tarunaFields.classList.add('hidden');
            orangTuaFields.classList.add('hidden');
            adminFields.classList.add('hidden');

            if (this.value === 'taruna') {
                tarunaFields.classList.remove('hidden');
                setRequired('taruna');
            } else if (this.value === 'orang_tua') {
                orangTuaFields.classList.remove('hidden');
                setRequired('orang_tua');
            } else if (this.value === 'admin') {
                adminFields.classList.remove('hidden');
                setRequired('admin');
            }
        });

        function setRequired(role) {
            // Reset required
            document.querySelectorAll('input').forEach(el => el.required = false);

            if (role === 'taruna') {
                document.getElementById('npm').required = true;
                document.getElementById('password').required = true;
            } else if (role === 'orang_tua') {
                document.getElementById('nama_ibu').required = true;
                document.getElementById('nama_anak').required = true;
                document.getElementById('tanggal_lahir_anak').required = true;
            } else if (role === 'admin') {
                document.getElementById('password_admin').required = true;
            }
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const role = roleSelect.value;
            if (!role) {
                showAlert('Pilih role terlebih dahulu!', 'error');
                return;
            }

            let endpoint = '';
            let body = {};

            if (role === 'taruna') {
                endpoint = '/login/taruna';
                body = {
                    npm: document.getElementById('npm').value,
                    password: document.getElementById('password').value
                };
            } else if (role === 'orang_tua') {
                endpoint = '/login/orangtua';
                body = {
                    nama_ibu: document.getElementById('nama_ibu').value,
                    nama_anak: document.getElementById('nama_anak').value,
                    tanggal_lahir_anak: document.getElementById('tanggal_lahir_anak').value
                };
            } else if (role === 'admin') {
                endpoint = '/login/admin';
                body = {
                    password: document.getElementById('password_admin').value
                };
            }

            try {
                const response = await apiCall(endpoint, 'POST', body);
                localStorage.setItem('token', response.data.token);
                localStorage.setItem('user', JSON.stringify(response.data.user));
                if (response.data.anak) {
                    localStorage.setItem('anak', JSON.stringify(response.data.anak));
                }

                // Redirect based on role
                if (role === 'taruna') window.location.href = 'dashboard/taruna-modern.html';
                else if (role === 'orang_tua') window.location.href = 'dashboard/orangtua-modern.html';
                else if (role === 'admin') window.location.href = 'dashboard/admin-modern.html';
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.classList.remove('hidden', 'bg-red-500/20', 'border-red-500', 'text-red-100', 'bg-green-500/20', 'border-green-500', 'text-green-100');
            if (type === 'error') {
                alert.classList.add('bg-red-500/20', 'border-red-500', 'text-red-100');
            } else {
                alert.classList.add('bg-green-500/20', 'border-green-500', 'text-green-100');
            }
        }
    </script>
</body>
</html>
