<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Premium - Sistem Cuti Taruna</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }

        /* Main container */
        .register-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Glass card effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        /* Input fields */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            transition: color 0.3s ease;
            z-index: 10;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
        }

        .input-field:focus + .input-icon {
            color: #667eea;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 1rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Alert message */
        .alert-message {
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fecaca;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #bbf7d0;
        }

        /* Floating shapes */
        .shape {
            position: absolute;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            z-index: 0;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -200px;
            right: -200px;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-weak {
            background: #ef4444;
        }

        .strength-medium {
            background: #f59e0b;
        }

        .strength-strong {
            background: #10b981;
        }

        .strength-very-strong {
            background: #3b82f6;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .register-container {
                padding: 1rem;
            }

            .glass-card {
                border-radius: 1.5rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background particles -->
    <div class="particles" id="particles"></div>

    <!-- Floating shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <!-- Main container -->
    <div class="register-container">
        <div class="w-full max-w-md" data-aos="fade-up" data-aos-duration="1000">
            <div class="glass-card p-8 md:p-10">
                <!-- Header -->
                <div class="text-center mb-6" data-aos="fade-down" data-aos-delay="200">
                    <div class="inline-block p-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4">
                        <i class="fas fa-user-plus text-white text-3xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-white mb-2">Daftar Taruna</h2>
                    <p class="text-gray-300">Buat akun baru untuk mengajukan cuti</p>
                </div>

                <!-- Alert Message -->
                <div id="alertMessage" class="hidden"></div>

                <!-- Register Form -->
                <form id="registerForm" class="space-y-4">
                    <!-- Nama Lengkap -->
                    <div class="input-group" data-aos="fade-up" data-aos-delay="300">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="nama_lengkap" class="input-field" placeholder="Nama Lengkap" required>
                    </div>

                    <!-- NPM -->
                    <div class="input-group" data-aos="fade-up" data-aos-delay="350">
                        <i class="fas fa-id-card input-icon"></i>
                        <input type="text" id="npm" class="input-field" placeholder="NPM" required>
                    </div>

                    <!-- Nama Ibu -->
                    <div class="input-group" data-aos="fade-up" data-aos-delay="400">
                        <i class="fas fa-female input-icon"></i>
                        <input type="text" id="nama_ibu" class="input-field" placeholder="Nama Ibu" required>
                    </div>

                    <!-- Tanggal Lahir -->
                    <div class="input-group" data-aos="fade-up" data-aos-delay="450">
                        <i class="fas fa-calendar input-icon"></i>
                        <input type="date" id="tanggal_lahir" class="input-field" required>
                    </div>

                    <!-- Password -->
                    <div class="input-group" data-aos="fade-up" data-aos-delay="500">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" class="input-field" placeholder="Password (min. 6 karakter)" minlength="6" required>
                    </div>

                    <!-- Password Strength Indicator -->
                    <div class="password-strength" data-aos="fade-up" data-aos-delay="520">
                        <div id="strengthBar" class="strength-bar"></div>
                    </div>
                    <p id="strengthText" class="text-xs text-gray-400 mt-1" data-aos="fade-up" data-aos-delay="530">Kekuatan password</p>

                    <!-- Konfirmasi Password -->
                    <div class="input-group" data-aos="fade-up" data-aos-delay="550">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password_confirmation" class="input-field" placeholder="Konfirmasi Password" required>
                    </div>

                    <!-- Password Match Indicator -->
                    <div id="matchIndicator" class="text-xs text-gray-400 mt-1 flex items-center gap-1" data-aos="fade-up" data-aos-delay="570">
                        <i class="fas fa-info-circle"></i>
                        <span>Masukkan ulang password</span>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="flex items-center gap-2 mt-4" data-aos="fade-up" data-aos-delay="600">
                        <input type="checkbox" id="terms" class="w-4 h-4 rounded border-gray-500 bg-white/10 checked:bg-indigo-600 focus:ring-indigo-600 focus:ring-2" required>
                        <label for="terms" class="text-sm text-gray-300">
                            Saya menyetujui
                            <a href="#" class="text-indigo-300 hover:text-indigo-200 hover:underline">Syarat & Ketentuan</a>
                            dan
                            <a href="#" class="text-indigo-300 hover:text-indigo-200 hover:underline">Kebijakan Privasi</a>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submitBtn" class="submit-btn" data-aos="fade-up" data-aos-delay="650">
                        <span class="btn-text">Daftar</span>
                        <span class="btn-spinner hidden"><span class="spinner"></span>Memproses...</span>
                    </button>
                </form>

                <!-- Footer -->
                <div class="mt-6 text-center" data-aos="fade-up" data-aos-delay="700">
                    <p class="text-gray-300">
                        Sudah punya akun?
                        <a href="login.html" class="text-indigo-300 hover:text-indigo-200 font-semibold transition hover:underline">
                            Login di sini
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize AOS
        AOS.init({
            once: true,
            mirror: false,
            duration: 1000,
        });

        // Create particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                // Random size
                const size = Math.random() * 10 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;

                // Random animation delay
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 20 + 10}s`;

                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        function checkPasswordStrength(password) {
            let strength = 0;

            // Length check
            if (password.length >= 6) strength += 1;
            if (password.length >= 8) strength += 1;

            // Character variety
            if (/[a-z]/.test(password)) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;

            return Math.min(strength, 5);
        }

        passwordInput.addEventListener('input', function() {
            const strength = checkPasswordStrength(this.value);
            const percentage = (strength / 5) * 100;

            strengthBar.style.width = `${percentage}%`;

            // Remove all strength classes
            strengthBar.classList.remove('strength-weak', 'strength-medium', 'strength-strong', 'strength-very-strong');

            // Add appropriate class
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Lemah';
            } else if (strength === 3) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Sedang';
            } else if (strength === 4) {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Kuat';
            } else if (strength === 5) {
                strengthBar.classList.add('strength-very-strong');
                strengthText.textContent = 'Sangat Kuat';
            }

            if (this.value.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = 'Kekuatan password';
            }
        });

        // Password match checker
        const confirmInput = document.getElementById('password_confirmation');
        const matchIndicator = document.getElementById('matchIndicator');

        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (confirm.length === 0) {
                matchIndicator.innerHTML = '<i class="fas fa-info-circle"></i><span>Masukkan ulang password</span>';
                matchIndicator.className = 'text-xs text-gray-400 mt-1 flex items-center gap-1';
                return;
            }

            if (password === confirm) {
                matchIndicator.innerHTML = '<i class="fas fa-check-circle text-green-400"></i><span class="text-green-400">Password cocok</span>';
                matchIndicator.className = 'text-xs mt-1 flex items-center gap-1';
            } else {
                matchIndicator.innerHTML = '<i class="fas fa-exclamation-circle text-red-400"></i><span class="text-red-400">Password tidak cocok</span>';
                matchIndicator.className = 'text-xs mt-1 flex items-center gap-1';
            }
        }

        passwordInput.addEventListener('input', checkPasswordMatch);
        confirmInput.addEventListener('input', checkPasswordMatch);

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password_confirmation').value;
            const terms = document.getElementById('terms').checked;

            // Validasi password match
            if (password !== confirm) {
                showAlert('Password dan konfirmasi password tidak cocok!', 'error');
                return;
            }

            // Validasi terms
            if (!terms) {
                showAlert('Anda harus menyetujui Syarat & Ketentuan', 'error');
                return;
            }

            // Show loading
            const submitBtn = document.getElementById('submitBtn');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnSpinner = submitBtn.querySelector('.btn-spinner');
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;

            const body = {
                nama_lengkap: document.getElementById('nama_lengkap').value,
                npm: document.getElementById('npm').value,
                password: password,
                nama_ibu: document.getElementById('nama_ibu').value,
                tanggal_lahir: document.getElementById('tanggal_lahir').value
            };

            try {
                await apiCall('/register', 'POST', body);
                showAlert('Pendaftaran berhasil! Mengarahkan ke halaman login...', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                showAlert(error.message, 'error');
                // Reset button
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = `alert-message alert-${type}`;
            alert.classList.remove('hidden');

            // Auto hide after 5 seconds
            setTimeout(() => {
                alert.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
