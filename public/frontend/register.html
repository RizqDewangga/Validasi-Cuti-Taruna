<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Taruna</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-user-plus me-2"></i>Daftar Taruna</h3>
                        <p class="mb-0">Buat akun baru untuk mengajukan cuti</p>
                    </div>
                    <div class="card-body">
                        <div id="alertMessage" class="alert alert-danger d-none" role="alert"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label"><i class="fas fa-user me-2"></i>Nama Lengkap</label>
                                <input type="text" class="form-control" id="nama_lengkap" required placeholder="Masukkan nama lengkap">
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="fas fa-id-card me-2"></i>NPM</label>
                                <input type="text" class="form-control" id="npm" required placeholder="Masukkan NPM">
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
                                <input type="password" class="form-control" id="password" required minlength="6" placeholder="Minimal 6 karakter">
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="fas fa-lock me-2"></i>Konfirmasi Password</label>
                                <input type="password" class="form-control" id="password_confirmation" required placeholder="Ulangi password">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-user-plus me-2"></i>Daftar
                            </button>
                        </form>

                        <hr class="my-4">
                        <div class="text-center">
                            <p class="mb-0">Sudah punya akun? <a href="login.html" class="text-decoration-none">Login di sini</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password_confirmation').value;

            if (password !== confirm) {
                showAlert('Password dan konfirmasi password tidak cocok!', 'danger');
                return;
            }

            const body = {
                nama_lengkap: document.getElementById('nama_lengkap').value,
                npm: document.getElementById('npm').value,
                password: password
            };

            try {
                await apiCall('/register', 'POST', body);
                showAlert('Pendaftaran berhasil! Mengarahkan ke halaman login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                showAlert(error.message, 'danger');
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.classList.remove('d-none');
        }
    </script>
</body>
</html>
