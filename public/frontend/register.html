<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Taruna Modern</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 min-h-screen flex items-center justify-center p-4">
    <!-- Background shapes -->
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-white rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    </div>

    <div class="relative w-full max-w-md">
        <div class="glass-effect rounded-2xl shadow-2xl p-8 space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold text-white">Daftar Taruna</h2>
                <p class="text-indigo-100 mt-2">Isi data diri Anda</p>
            </div>

            <div id="alertMessage" class="hidden bg-red-500/20 border border-red-500 text-red-100 px-4 py-3 rounded-lg text-sm"></div>

            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Nama Lengkap</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-user"></i></span>
                        <input type="text" id="nama_lengkap" required class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition" placeholder="Masukkan nama lengkap">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white mb-2">NPM</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-id-card"></i></span>
                        <input type="text" id="npm" required class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition" placeholder="Masukkan NPM">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Nama Ibu</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-female"></i></span>
                        <input type="text" id="nama_ibu" required class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition" placeholder="Masukkan nama ibu">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Tanggal Lahir</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-calendar"></i></span>
                        <input type="date" id="tanggal_lahir" required class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-white/50 transition [color-scheme:dark]">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" required minlength="6" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition" placeholder="Minimal 6 karakter">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-white mb-2">Konfirmasi Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/60"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password_confirmation" required class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition" placeholder="Ulangi password">
                    </div>
                </div>

                <button type="submit" class="w-full py-3 px-4 bg-white text-indigo-600 font-semibold rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition duration-300">
                    <i class="fas fa-user-plus mr-2"></i>Daftar
                </button>
            </form>

            <div class="text-center text-sm text-indigo-100">
                Sudah punya akun?
                <a href="login-modern.html" class="font-semibold text-white hover:underline">Login di sini</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password_confirmation').value;

            if (password !== confirm) {
                showAlert('Password dan konfirmasi tidak cocok!', 'error');
                return;
            }

            const body = {
                nama_lengkap: document.getElementById('nama_lengkap').value,
                npm: document.getElementById('npm').value,
                password: password,
                nama_ibu: document.getElementById('nama_ibu').value,
                tanggal_lahir: document.getElementById('tanggal_lahir').value
            };

            try {
                await apiCall('/register', 'POST', body);
                showAlert('Pendaftaran berhasil! Mengarahkan ke login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login-modern.html';
                }, 2000);
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });

        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.classList.remove('hidden', 'bg-red-500/20', 'border-red-500', 'text-red-100', 'bg-green-500/20', 'border-green-500', 'text-green-100');
            if (type === 'error') {
                alert.classList.add('bg-red-500/20', 'border-red-500', 'text-red-100');
            } else {
                alert.classList.add('bg-green-500/20', 'border-green-500', 'text-green-100');
            }
        }
    </script>
</body>
</html>
