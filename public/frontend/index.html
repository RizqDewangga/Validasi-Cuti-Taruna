<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Cuti Taruna</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .hero-section {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        .hero-section h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .hero-section p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .btn-hero {
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            margin: 0.5rem;
            transition: transform 0.3s;
        }
        .btn-hero:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-hero-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            margin: 0.5rem;
            transition: all 0.3s;
        }
        .btn-hero-outline:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .feature-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 15px;
            padding: 2rem;
            color: white;
            text-align: center;
            transition: transform 0.3s;
            margin-top: 2rem;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }
        .feature-card i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 mx-auto text-center">
                <div class="hero-section">
                    <h1><i class="fas fa-graduation-cap me-3"></i>Sistem Cuti Taruna</h1>
                    <p class="lead">Aplikasi pengajuan cuti online untuk taruna, orang tua, dan pengasuh</p>
                    <div class="mt-4">
                        <a href="login.html" class="btn btn-hero"><i class="fas fa-sign-in-alt me-2"></i>Login</a>
                        <a href="register.html" class="btn btn-hero-outline"><i class="fas fa-user-plus me-2"></i>Daftar Taruna</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-md-4">
                <div class="feature-card">
                    <i class="fas fa-user-graduate"></i>
                    <h4>Taruna</h4>
                    <p>Ajukan cuti dengan mudah, isi data tujuan dan transportasi</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <i class="fas fa-users"></i>
                    <h4>Orang Tua</h4>
                    <p>Pantau dan setujui/tolak pengajuan cuti anak Anda</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <i class="fas fa-user-tie"></i>
                    <h4>Pengasuh</h4>
                    <p>Kelola semua data cuti dengan mudah dan cepat</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
