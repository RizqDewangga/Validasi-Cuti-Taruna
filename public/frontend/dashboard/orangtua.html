<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Orang Tua - Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .sidebar {
            background: linear-gradient(180deg, #064e3b 0%, #047857 100%);
        }
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body class="antialiased">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="sidebar w-64 text-white flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold flex items-center"><i class="fas fa-users mr-3"></i>Orang Tua</h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="#" class="flex items-center px-4 py-3 text-white bg-white/10 rounded-lg transition hover:bg-white/20">
                    <i class="fas fa-list w-6"></i>
                    <span>Daftar Cuti Anak</span>
                </a>
                <a href="#" onclick="logout()" class="flex items-center px-4 py-3 text-white/80 rounded-lg transition hover:bg-white/20 hover:text-white">
                    <i class="fas fa-sign-out-alt w-6"></i>
                    <span>Logout</span>
                </a>
            </nav>
            <div class="p-4 border-t border-white/20">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <div class="ml-3">
                        <p id="userName" class="text-sm font-semibold">Loading...</p>
                        <p id="anakName" class="text-xs text-white/70">Anak: -</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-3xl font-bold text-gray-800 mb-6">Pengajuan Cuti <span id="anakNameHeader" class="text-indigo-600"></span></h2>

                <!-- Tabel Cuti Anak -->
                <div class="bg-white rounded-xl shadow-md p-6">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Daftar Pengajuan Cuti</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tujuan</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Dituju</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Transportasi</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="cutiList" class="bg-white divide-y divide-gray-200">
                                <!-- Data dari JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const auth = checkAuth('orang_tua');
        if (!auth) throw new Error('Not authenticated');
        const user = auth.user;
        const token = auth.token;
        const anak = JSON.parse(localStorage.getItem('anak') || '{}');

        if (!anak.id) {
            alert('Data anak tidak ditemukan!');
            window.location.href = '../login-modern.html';
        }

        document.getElementById('userName').textContent = user.nama_lengkap;
        document.getElementById('anakName').textContent = `Anak: ${anak.nama_lengkap}`;
        document.getElementById('anakNameHeader').textContent = anak.nama_lengkap;

        async function loadCuti() {
            try {
                const response = await apiCall(`/cuti?taruna_id=${anak.id}`, 'GET', null, token);
                const cutiList = response.data;
                const tbody = document.getElementById('cutiList');
                tbody.innerHTML = '';

                cutiList.forEach((cuti, index) => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${index+1}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${cuti.alamat_tujuan}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${cuti.alamat_dituju}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${cuti.transportasi}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full
                                ${cuti.status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                                  cuti.status === 'disetujui' ? 'bg-green-100 text-green-800' :
                                  'bg-red-100 text-red-800'}">
                                ${cuti.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatDate(cuti.created_at)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            ${cuti.status === 'pending' ?
                                `<button onclick="approveCuti(${cuti.id})" class="text-green-600 hover:text-green-900 mr-2">
                                    <i class="fas fa-check"></i> Setujui
                                </button>
                                <button onclick="rejectCuti(${cuti.id})" class="text-red-600 hover:text-red-900">
                                    <i class="fas fa-times"></i> Tolak
                                </button>` : '-'}
                        </td>
                    `;
                });
            } catch (error) {
                console.error(error);
            }
        }

        window.approveCuti = async function(id) {
            try {
                await apiCall(`/cuti/${id}/approve`, 'POST', { taruna_id: anak.id }, token);
                alert('Cuti disetujui');
                loadCuti();
            } catch (error) {
                alert('Gagal: ' + error.message);
            }
        };

        window.rejectCuti = async function(id) {
            try {
                await apiCall(`/cuti/${id}/reject`, 'POST', { taruna_id: anak.id }, token);
                alert('Cuti ditolak');
                loadCuti();
            } catch (error) {
                alert('Gagal: ' + error.message);
            }
        };

        window.logout = logout;
        loadCuti();
    </script>
</body>
</html>
