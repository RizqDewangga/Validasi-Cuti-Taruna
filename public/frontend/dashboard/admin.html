<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-md-3 col-lg-2 px-0">
                    <div class="sidebar">
                        <div class="text-center mb-4">
                            <img src="https://via.placeholder.com/80" class="rounded-circle mb-2" alt="Profile">
                            <h5 id="userName" class="mb-1"></h5>
                            <p class="text-muted">Admin</p>
                        </div>
                        <nav class="nav flex-column">
                            <a class="nav-link active" href="#" onclick="loadCuti()">
                                <i class="fas fa-list"></i> Semua Cuti
                            </a>
                            <a class="nav-link" href="#" onclick="logout()">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </nav>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-md-9 col-lg-10 main-content">
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="stat-card primary">
                                <div class="icon">
                                    <i class="fas fa-clock"></i>
                                </div>
                                <h3 id="totalPending">0</h3>
                                <p class="text-muted">Pending</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card success">
                                <div class="icon">
                                    <i class="fas fa-check-circle"></i>
                                </div>
                                <h3 id="totalApproved">0</h3>
                                <p class="text-muted">Disetujui</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card danger">
                                <div class="icon">
                                    <i class="fas fa-times-circle"></i>
                                </div>
                                <h3 id="totalRejected">0</h3>
                                <p class="text-muted">Ditolak</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="stat-card warning">
                                <div class="icon">
                                    <i class="fas fa-file-alt"></i>
                                </div>
                                <h3 id="totalAll">0</h3>
                                <p class="text-muted">Total</p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Semua Pengajuan Cuti</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>No</th>
                                            <th>Nama Taruna</th>
                                            <th>Alamat Tujuan</th>
                                            <th>Alamat Dituju</th>
                                            <th>Transportasi</th>
                                            <th>Status</th>
                                            <th>Disetujui Oleh</th>
                                            <th>Tanggal Approve</th>
                                        </tr>
                                    </thead>
                                    <tbody id="cutiList">
                                        <!-- Data akan diisi via JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Cek autentikasi
        const auth = checkAuth('admin');
        if (!auth) throw new Error('Not authenticated');

        const user = auth.user;
        const token = auth.token;

        document.getElementById('userName').textContent = user.nama_lengkap;

        // Load semua cuti
        async function loadCuti() {
            try {
                const response = await apiCall('/admin/cuti', 'GET', null, token);
                const cutiList = response.data;

                // Update statistik
                const pending = cutiList.filter(c => c.status === 'pending').length;
                const approved = cutiList.filter(c => c.status === 'disetujui').length;
                const rejected = cutiList.filter(c => c.status === 'ditolak').length;

                document.getElementById('totalPending').textContent = pending;
                document.getElementById('totalApproved').textContent = approved;
                document.getElementById('totalRejected').textContent = rejected;
                document.getElementById('totalAll').textContent = cutiList.length;

                // Tampilkan tabel
                const tbody = document.getElementById('cutiList');
                tbody.innerHTML = '';

                cutiList.forEach((cuti, index) => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${cuti.taruna ? cuti.taruna.nama_lengkap : '-'}</td>
                        <td>${cuti.alamat_tujuan}</td>
                        <td>${cuti.alamat_dituju}</td>
                        <td>${cuti.transportasi}</td>
                        <td>
                            <span class="badge ${cuti.status === 'pending' ? 'badge-pending' : cuti.status === 'disetujui' ? 'badge-approved' : 'badge-rejected'}">
                                ${cuti.status}
                            </span>
                        </td>
                        <td>${cuti.approver ? cuti.approver.nama_lengkap : '-'}</td>
                        <td>${formatDate(cuti.approved_at)}</td>
                    `;
                });
            } catch (error) {
                console.error('Gagal memuat cuti:', error);
            }
        }

        // Logout
        window.logout = logout;

        // Load data
        loadCuti();
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
