<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .sidebar {
            background: linear-gradient(180deg, #1e1e2f 0%, #2d2d44 100%);
        }
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }
        .stat-card {
            @apply bg-white rounded-xl shadow-md p-6 card-hover;
        }
    </style>
</head>
<body class="antialiased">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="sidebar w-64 text-white flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold flex items-center"><i class="fas fa-user-tie mr-3"></i>Admin</h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="#" class="flex items-center px-4 py-3 text-white bg-white/10 rounded-lg transition hover:bg-white/20">
                    <i class="fas fa-tachometer-alt w-6"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" onclick="logout()" class="flex items-center px-4 py-3 text-white/80 rounded-lg transition hover:bg-white/20 hover:text-white">
                    <i class="fas fa-sign-out-alt w-6"></i>
                    <span>Logout</span>
                </a>
            </nav>
            <div class="p-4 border-t border-white/20">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <div class="ml-3">
                        <p id="userName" class="text-sm font-semibold">Loading...</p>
                        <p class="text-xs text-white/70">Administrator</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-3xl font-bold text-gray-800 mb-6">Dashboard Admin</h2>

                <!-- Statistik Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="stat-card">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-600">
                                <i class="fas fa-clock text-2xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm text-gray-500">Pending</p>
                                <p id="totalPending" class="text-2xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center text-green-600">
                                <i class="fas fa-check-circle text-2xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm text-gray-500">Disetujui</p>
                                <p id="totalApproved" class="text-2xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center text-red-600">
                                <i class="fas fa-times-circle text-2xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm text-gray-500">Ditolak</p>
                                <p id="totalRejected" class="text-2xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center text-purple-600">
                                <i class="fas fa-file-alt text-2xl"></i>
                            </div>
                            <div class="ml-4">
                                <p class="text-sm text-gray-500">Total</p>
                                <p id="totalAll" class="text-2xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tabel Semua Cuti -->
                <div class="bg-white rounded-xl shadow-md p-6">
                    <h3 class="text-xl font-semibold text-gray-800 mb-4">Semua Pengajuan Cuti</h3>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Taruna</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Alamat Cuti</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tujuan</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Transportasi</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tiket</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Disetujui Oleh</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tanggal</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="cutiList" class="bg-white divide-y divide-gray-200">
                                <!-- Data dari JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // ==================== INISIALISASI ====================
        const auth = checkAuth('admin');
        if (!auth) throw new Error('Not authenticated');
        const user = auth.user;
        const token = auth.token;

        document.getElementById('userName').textContent = user.nama_lengkap;

        // ==================== FUNGSI HELPER ====================
        function formatAlamat(alamatCuti) {
            if (!alamatCuti) return '-';
            return `${alamatCuti.jalan}, RT/RW ${alamatCuti.rt_rw}, ${alamatCuti.kelurahan}, ${alamatCuti.kecamatan}, ${alamatCuti.kota}, ${alamatCuti.provinsi}`;
        }

        // ==================== LOAD DATA CUTI ====================
        async function loadCuti() {
            try {
                const response = await apiCall('/admin/cuti', 'GET', null, token);
                const cutiList = response.data;

                // Statistik
                const pending = cutiList.filter(c => c.status === 'pending').length;
                const approved = cutiList.filter(c => c.status === 'disetujui').length;
                const rejected = cutiList.filter(c => c.status === 'ditolak').length;
                document.getElementById('totalPending').textContent = pending;
                document.getElementById('totalApproved').textContent = approved;
                document.getElementById('totalRejected').textContent = rejected;
                document.getElementById('totalAll').textContent = cutiList.length;

                // Tabel
                const tbody = document.getElementById('cutiList');
                tbody.innerHTML = '';

                cutiList.forEach((cuti, index) => {
                    const row = tbody.insertRow();

                    // Format tujuan display
                    let tujuanDisplay = 'Orang Tua';
                    if (cuti.tujuan === 'kerabat') {
                        tujuanDisplay = `Kerabat: ${cuti.nama_kerabat || '-'}<br>${cuti.nomor_kerabat || '-'}`;
                    }

                    // Format link tiket
                    let tiketDisplay = '-';
                    if (cuti.tiket_path) {
                        const baseStorageUrl = CONFIG.API_BASE_URL.replace('/api', '/storage');
                        tiketDisplay = `<a href="${baseStorageUrl}/${cuti.tiket_path}" target="_blank" class="text-indigo-600 hover:text-indigo-900">
                                            <i class="fas fa-file-pdf"></i> Lihat Tiket
                                        </a>`;
                    }

                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${index+1}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${cuti.taruna ? cuti.taruna.nama_lengkap : '-'}</td>
                        <td class="px-6 py-4 text-sm text-gray-900 max-w-xs">${formatAlamat(cuti.alamat_cuti)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${tujuanDisplay}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${cuti.transportasi || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${tiketDisplay}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full
                                ${cuti.status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                                  cuti.status === 'disetujui' ? 'bg-green-100 text-green-800' :
                                  'bg-red-100 text-red-800'}">
                                ${cuti.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${cuti.approver ? cuti.approver.nama_lengkap : '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${formatDate(cuti.approved_at)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            ${cuti.status === 'pending' ?
                                `<button onclick="approveCuti(${cuti.id})" class="text-green-600 hover:text-green-900 mr-2">
                                    <i class="fas fa-check"></i> Setujui
                                </button>
                                <button onclick="rejectCuti(${cuti.id})" class="text-red-600 hover:text-red-900">
                                    <i class="fas fa-times"></i> Tolak
                                </button>` : '-'}
                        </td>
                    `;
                });
            } catch (error) {
                console.error('Gagal memuat cuti:', error);
            }
        }

        // ==================== APPROVE CUTI ====================
        window.approveCuti = async function(id) {
            try {
                await apiCall(`/cuti/${id}/approve`, 'POST', { taruna_id: null }, token);
                alert('Cuti disetujui');
                loadCuti();
            } catch (error) {
                alert('Gagal menyetujui: ' + error.message);
            }
        };

        // ==================== REJECT CUTI ====================
        window.rejectCuti = async function(id) {
            try {
                await apiCall(`/cuti/${id}/reject`, 'POST', { taruna_id: null }, token);
                alert('Cuti ditolak');
                loadCuti();
            } catch (error) {
                alert('Gagal menolak: ' + error.message);
            }
        };

        // ==================== LOGOUT ====================
        window.logout = logout;

        // ==================== LOAD DATA AWAL ====================
        loadCuti();
    </script>
</body>
</html>
